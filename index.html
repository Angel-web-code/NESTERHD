<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NESTERHD</title>

    <link rel="icon" type="image/jpeg" href="icono.jpg">

    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        /* ===== INTRO ===== */
        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 2s ease forwards;
            animation-delay: 5s;
        }

        #intro h1 {
            font-size: 60px;
            animation: glow 1.5s infinite alternate, zoomIn 1.5s ease forwards;
        }

        .sub {
            color: #aaa;
            margin-top: 10px;
        }

        .mensaje {
            margin-top: 20px;
            color: red;
            animation: parpadeo 1s infinite;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px red; }
            to { text-shadow: 0 0 25px #ff0000; }
        }

        @keyframes zoomIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* ===== GLITCH ===== */
        .glitch-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        .glitch-active .glitch-layer {
            animation: glitchFlash 0.3s;
        }

        @keyframes glitchFlash {
            0% { opacity: 0; }
            20% { opacity: 0.4; background: red; }
            40% { opacity: 0.4; background: blue; }
            60% { opacity: 0.4; background: green; }
            80% { opacity: 0.4; background: white; }
            100% { opacity: 0; }
        }

        /* ===== BARRA ===== */
        .barra {
            width: 300px;
            height: 10px;
            background: #222;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progreso {
            height: 100%;
            width: 0%;
            background: red;
            animation: cargar 4s linear forwards;
        }

        @keyframes cargar {
            from { width: 0%; }
            to { width: 100%; }
        }

        /* ===== CONTENIDO ===== */
        .galeria {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .galeria img {
            width: 450px;
            border-radius: 10px;
            transition: 0.3s;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .galeria img:hover {
            transform: scale(1.15);
            filter: brightness(1.3);
        }

        .descarga button {
            background-color: red;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- INTRO -->
    <div id="intro">
        <div class="glitch-layer"></div>

        <h1>NESTERHD</h1>
        <p class="sub">Capítulo 5 - EN DESARROLLO</p>
        <p class="mensaje" id="textoCarga">Cargando...</p>

        <div class="barra">
            <div class="progreso"></div>
        </div>
    </div>

    <!-- CONTENIDO -->
    <h1>NESTERHD</h1>
    <p>Mi fangame de Poppy PLAYTIME capítulo 5 (EN DESARROLLO)</p>

    <div class="galeria">
        <img src="menu.jpg">
        <img src="juego.jpg">
        <img src="juego2.jpg">
        <img src="juego3.jpg">
        <img src="juego4.jpg">
    </div>

    <div class="descarga">
        <a href="https://drive.google.com/uc?export=download&id=15Guwm9w5HfEWHvUgA9DrpdzVhi35wkc3" target="_blank">
            <button>Descargar APK 📲</button>
        </a>
    </div>

    <!-- AUDIO -->
    <audio id="audioIntro" src="intro.mp3"></audio>
    <audio id="audioFondo" src="140529.mp3" loop></audio>

    <script>
        const texto = document.getElementById("textoCarga");
        const intro = document.getElementById("intro");
        const audioIntro = document.getElementById("audioIntro");
        const audio = document.getElementById("audioFondo");

        window.onload = () => {
            audioIntro.play();

            setTimeout(() => {
                texto.innerText = "Cargando archivos...";
            }, 1500);

            setTimeout(() => {
                texto.innerText = "Iniciando sistema...";
            }, 3000);

            setTimeout(() => {
                intro.classList.add("glitch-active");
            }, 4000);

            setTimeout(() => {
                audioIntro.pause();
                audio.play();
            }, 4500);
        }
    </script>

</body>
</html>
