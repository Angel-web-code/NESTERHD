<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NESTERHD</title>

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="icono.jpg">

    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* INTRO */
        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 2s ease forwards;
            animation-delay: 3s;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Animaciones generales */
        @keyframes slideDown {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        h1 {
            font-size: 40px;
            margin-top: 20px;
            animation: slideDown 1s ease-out forwards;
        }

        p {
            font-size: 18px;
            color: gray;
            margin-bottom: 30px;
            animation: fadeIn 2s ease-out forwards;
        }

        /* Galería */
        .galeria {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .galeria img {
            width: 450px;
            border-radius: 10px;
            transition: transform 0.3s, filter 0.3s;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .galeria img:hover {
            transform: scale(1.15) translateY(-5px);
            filter: brightness(1.3);
        }

        /* Botón descarga */
        .descarga button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.5s;
            animation: fadeIn 3s ease-out forwards;
        }

        .descarga button:hover {
            background-color: #ff5555;
            transform: scale(1.1);
            animation: glow 1s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px #ff0000; }
            to { box-shadow: 0 0 20px #ff5555; }
        }

        /* Botón música */
        .audio-btn {
            margin-bottom: 50px;
            background-color: #00ff00;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- INTRO -->
    <div id="intro">
        <h1>NESTERHD</h1>
        <p>Capítulo 5 - EN DESARROLLO</p>
    </div>

    <h1>NESTERHD</h1>
    <p>Mi fangame de Poppy PLAYTIME capítulo 5 (EN DESARROLLO)</p>

    <div class="galeria">
        <img src="menu.jpg" style="animation-delay: 0.2s;">
        <img src="juego.jpg" style="animation-delay: 0.5s;">
        <img src="juego2.jpg" style="animation-delay: 0.8s;">
        <img src="juego3.jpg" style="animation-delay: 1.1s;">
        <img src="juego4.jpg" style="animation-delay: 1.4s;">
    </div>

    <div class="descarga">
        <a href="https://drive.google.com/uc?export=download&id=15Guwm9w5HfEWHvUgA9DrpdzVhi35wkc3" target="_blank">
            <button>Descargar APK 📲</button>
        </a>
    </div>

    <audio id="audioFondo" src="140529.mp3" autoplay loop></audio>
    <button class="audio-btn" onclick="toggleAudio()">🎵 Música</button>

    <script>
        const audio = document.getElementById('audioFondo');
        function toggleAudio() {
            if(audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>

</body>
</html>
